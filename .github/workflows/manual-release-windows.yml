name: Build Windows Release manually

on:
  workflow_dispatch:

jobs:
  windows-build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Init submodules
        run: git submodule update --init --checkout --recursive

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Download avrdude
        shell: pwsh
        run: |
          Invoke-WebRequest 'https://github.com/avrdudes/avrdude/releases/download/v8.0/avrdude-v8.0-windows-x86.zip' -OutFile 'resources/modules/win32/avrdude.zip'
          Expand-Archive -Path 'resources/modules/win32/avrdude.zip' -DestinationPath 'resources/modules/win32' -Force
          Remove-Item 'resources/modules/win32/avrdude.zip'

      - name: Download Arduino CLI
        shell: pwsh
        run: |
          Invoke-WebRequest 'https://downloads.arduino.cc/arduino-cli/arduino-cli_latest_Windows_64bit.zip' -OutFile 'resources/modules/win32/arduino-cli.zip'
          Expand-Archive -Path 'resources/modules/win32/arduino-cli.zip' -DestinationPath 'resources/modules/win32/arduino-cli' -Force
          Remove-Item 'resources/modules/win32/arduino-cli.zip'

      - name: Download Arduino CLI libraries
        shell: pwsh
        run: |
          if (Test-Path 'build/arduino-cli-libs') { Remove-Item 'build/arduino-cli-libs' -Recurse -Force }
          if (Test-Path 'build/arduino-cli-libs-extracted') { Remove-Item 'build/arduino-cli-libs-extracted' -Recurse -Force }
          New-Item -ItemType Directory -Path 'build/arduino-cli-libs/packages' -Force | Out-Null
          New-Item -ItemType Directory -Path 'build/arduino-cli-libs-extracted' -Force | Out-Null

          Invoke-WebRequest 'https://seafile.polyus-nt.ru/f/b596a9c281dc423b9cec/?dl=1' -OutFile 'build/arduino-cli-libs.zip'
          Expand-Archive -Path 'build/arduino-cli-libs.zip' -DestinationPath 'build/arduino-cli-libs-extracted' -Force
          Remove-Item 'build/arduino-cli-libs.zip'

          $packagesDir = Get-ChildItem 'build/arduino-cli-libs-extracted' -Directory -Recurse |
            Where-Object { $_.Name -eq 'packages' } |
            Select-Object -First 1

          if (-not $packagesDir) {
            Write-Host 'Arduino CLI offline bundle does not contain a packages directory'
            Get-ChildItem 'build/arduino-cli-libs-extracted' -Directory -Recurse | Select-Object -ExpandProperty FullName
            throw 'packages directory not found in Arduino CLI offline bundle'
          }

          Copy-Item -Path (Join-Path $packagesDir.FullName '*') -Destination 'build/arduino-cli-libs/packages' -Recurse -Force
          Remove-Item 'build/arduino-cli-libs-extracted' -Recurse -Force

      - name: Download gcc-arm-none-eabi
        shell: pwsh
        run: |
          if (Test-Path 'build/gcc-arm-none-eabi') { Remove-Item 'build/gcc-arm-none-eabi' -Recurse -Force }
          Invoke-WebRequest 'https://seafile.polyus-nt.ru/f/83d0be836d1c491fa3b3/?dl=1' -OutFile 'build/gcc-arm-none-eabi.zip'
          Expand-Archive -Path 'build/gcc-arm-none-eabi.zip' -DestinationPath 'build/gcc-arm-none-eabi' -Force
          Remove-Item 'build/gcc-arm-none-eabi.zip'

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Build Windows installer
        run: npm run bundle:win

      - name: Save exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: exe-build
          path: |
            dist/*.exe
